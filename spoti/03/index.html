  <style>
    body,
    html {
      height: 100%;
      margin: 0;
      padding: 0;
      justify-content: space-around;
      display: flex;
      flex-direction: column;
      background-color: rgb(24, 24, 24);
      align-items: center;
      /* Centraliza verticalmente */
    }

    .centralizado {
      margin-top: 70px;
      width: 300px;
      background-color: rgb(0, 0, 0);
      text-align: center;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      border-radius: 10px;
    }

    * {
      font-family: "Poppins", sans-serif;
      color: white;
      padding: 0px;
    }

    #logocentral {
      width: 90px;
    }

    #textoprincipalsptfy {
      font-size: 23px;
      font-weight: 700;
    }

    #descricaoiniciospotify {
      color: rgb(168, 168, 168);
      margin-top: -10px;
      font-size: 14px;
    }

    #descricaoiniciospotifyy {
      color: rgb(168, 168, 168);
      font-size: 14px;
      font-weight: 500;
      padding: 0 15px;
      text-align: center;
    }

    #divisorlinha {
      width: 95%;
      height: 1px;
      background-color: rgb(105, 105, 105);
    }

    #txtinputmeil {

    }

    #logincadastro {
      display: flex;
      font-size: 15px;
      width: 100%;
      flex-direction: column;
      text-align: left;
    }

    #inputcadastro,
    #nomeInput {
      padding: 13px 10px;
      color: rgb(168, 168, 168);
      border-radius: 5px;
      margin-top: 5px;
      border: 1px solid rgb(168, 168, 168);
      background-color: rgb(24, 24, 24);
    }

    #meuBotao {
      padding: 13px 10px;
      background-color: gray;
      color: white;
      margin-top: 10px;
      border-radius: 50px;
      border: 1px solid gray;
      text-decoration: none;
      width: 90%;
      font-weight: 600;
    }

    /* Estilo após a mudança de cor */
    .verde {
      background-color: rgb(1, 214, 97);
      cursor: pointer;
      /* Muda o cursor para indicar que agora é clicável */
    }

    #topoFixo {
      position: fixed;
      top: 0;
      /* Define a posição no topo da página */
      left: 0;
      /* Alinha à esquerda */
      width: 100%;
      /* Faz a div ocupar toda a largura da página */
      background-color: #000000;
      /* Cor de fundo (verde) */
      color: white;
      /* Cor do texto */
      padding: 15px 10px;
      align-items: center;
      display: flex;
      justify-content: space-between;
      text-align: center;
      /* Centraliza o texto */
    }

    #logo {
      width: 130px;
    }

    #saldoatual {

      border-radius: 10px;
      margin-right: 20px;

    #txtnotificacao {

    }

    #notificacao {
      background-color: rgba(1, 214, 97, 0.434);
      display: flex;
      margin-top: -10px;

      margin-bottom: 10px;

      font-size: 14px;

    <!-- DADOS DE LOGIN -->
    <iframe style="border-radius:10px"
      src="https://open.spotify.com/embed/track/7EknynLJTt9YMm1HL37s5D?utm_source=generator&theme=0" width="100%"

      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

    <!-- SISTEMA DE AVALIACAO -->
    <style>
      .botaperguntas {
        display: flex;
        padding: 10px;
        margin-top: -20px;
        justify-content: space-between;
      }

      .opcao {
        padding: 10px 50px;
        border-radius: 10px;
        width: 90%;
        background-color: gray;
        color: white;
        cursor: pointer;
      }

      #avalaiacao {
        margin-top: -50px;
      }
    </style>
    <div id="avalaiacao">

      <!-- PERGUNTA 1 -->
      <div class="perguntacompleta">
        <p id="texytpergunta">Você escuta pagode?</p>
        <div class="botaperguntas" data-grupo="q1">
          <div class="opcao" onclick="selecionarOpcao('q1', this)">Sim</div>
          <div class="opcao" onclick="selecionarOpcao('q1', this)" style="margin-left:10px;">Não</div>
        </div>
      </div>

      <!-- PERGUNTA 2 -->
      <div class="perguntacompleta">
        <p id="texytpergunta">Curte músicas ao vivo?</p>
        <div class="botaperguntas" data-grupo="q2">
          <div class="opcao" onclick="selecionarOpcao('q2', this)">Sim</div>
          <div class="opcao" onclick="selecionarOpcao('q2', this)" style="margin-left:10px;">Não</div>
        </div>
      </div>

    </div>

    <script>
      let respondeuQ1 = false;
      let respondeuQ2 = false;
      // let tempoLiberado = false;
    </script>


    <script>
      function selecionarOpcao(grupo, botaoClicado) {
        const grupoBotoes = document.querySelectorAll(
          `.botaperguntas[data-grupo="${grupo}"] .opcao`
        );

        grupoBotoes.forEach(botao => {
          botao.style.backgroundColor = 'gray';
          botao.style.borderColor = 'gray';
        });

        botaoClicado.style.backgroundColor = 'rgb(1, 214, 97)';
        botaoClicado.style.borderColor = 'rgb(1, 214, 97)';

        // Marca pergunta como respondida
        if (grupo === 'q1') respondeuQ1 = true;
        if (grupo === 'q2') respondeuQ2 = true;

        verificarLiberacao();
      }
    </script>

    <script>
      function verificarLiberacao() {
        if (respondeuQ1 && respondeuQ2) {
          const botao = document.getElementById('meuBotao');
          botao.style.backgroundColor = 'rgb(1, 214, 97)';
          botao.style.borderColor = 'rgb(1, 214, 97)';
          botao.style.cursor = 'pointer';
          botao.innerText = 'Ir para a próxima música';
          botao.disabled = false;

          // 🔥 REDIRECIONAMENTO AQUI
          botao.onclick = function () {
            const params = new URLSearchParams(window.location.search);
            const nome = params.get('nome');

            // UTMs
            const utmParams = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content']
              .map(p => localStorage.getItem(p) ? `${p}=${encodeURIComponent(localStorage.getItem(p))}` : '')
              .filter(Boolean)
              .join('&');

            let urlDestino = '../04/';

            if (nome) {
              urlDestino += `?nome=${encodeURIComponent(nome)}`;
              if (utmParams) urlDestino += `&${utmParams}`;
            }

            window.location.href = urlDestino;
          };
        }
      }
    </script>



    <button id="meuBotao" disabled="">De play e faça um feedback</button>


    <p id="descricaoiniciospotifyy">
      Este site é protegido pelo reCAPTCHA e está sujeito à
      <a href="https://www.spotify.com/br-pt/legal/privacy-policy/" target="_blank" class="link-verde">
        Política de Privacidade
      </a>
      e aos
      <a href="https://policies.google.com/terms?hl=pt-BR" target="_blank" class="link-verde">
        Termos de Serviço do Google
      </a>.
    </p>

  </div>

  <script>
    window.onload = function () {
      // Obtém os parâmetros da URL
      const params = new URLSearchParams(window.location.search);

      // Captura o valor do parâmetro "nome"
      const nome = params.get('nome');

      // Exibe o valor no HTML
      if (nome) {
        document.getElementById('mensagem').innerText = `${nome}!`;
      } else {
        document.getElementById('mensagem').innerText = 'Nome não encontrado!';
      }
    }
  </script>
